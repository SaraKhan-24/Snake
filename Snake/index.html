<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js');
      }
    </script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameBoard"></canvas>
        <div id="gameOverPanel" class="overlay-panel">
            <h1>GAME OVER</h1>
            <p>Your Score: <span id="finalScore">0</span></p>
            <button id="resetBtn">Restart</button>
        </div>
        <audio id="backgroundAudio" src="sounds\beings-of-electric-breath-76643.mp4"></audio>
        <audio id="starAudio" src="sounds\Untitled video - Made with Clipchamp (4).mp4"></audio>
        <audio id="eatingAudio" src="sounds\ding-sound-43207.mp4"></audio>
        <audio id="gameoverAudio" src="sounds\videogame-death-sound-43894.mp3"></audio>

        <div id="scoreText">0</div>
    </div>
    <script src="snake.js"></script>
</body>
</html>
